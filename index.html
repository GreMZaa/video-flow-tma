    <script>
      window.__TMA_LOG__ = [];
      window.onloadStatus = 'pending';
      function logTMA(msg) { 
        console.log('[TMA]', msg); 
        window.__TMA_LOG__.push(msg);
      }
    </script>
    <script 
      id="tg-sdk"
      src="https://telegram.org/js/telegram-web-app.js"
      onload="window.onloadStatus='loaded'; logTMA('SDK Loaded');"
      onerror="window.onloadStatus='error'; logTMA('SDK Load Error');"
    ></script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <script>
      (function() {
        try {
          var check = setInterval(function() {
            if (window.Telegram && window.Telegram.WebApp) {
              var tw = window.Telegram.WebApp;
              tw.ready();
              tw.expand();
              logTMA('SDK Init Success');
              clearInterval(check);
            }
          }, 100);
          setTimeout(function() { clearInterval(check); }, 5000);
        } catch (e) {
          logTMA('Init Error: ' + e.message);
        }
      })();
    </script>
    <title>Video Flow Mini App</title>
    <style>
      :root {
        --tg-viewport-height: 100vh;
      }
      body {
        margin: 0;
        padding: 0;
        height: var(--tg-viewport-height);
        overflow: hidden;
      }
      #root {
        height: 100%;
        overflow-y: auto;
      }
    </style>
  </head>
  <body class="bg-[#050505]">
    <div id="root">
      <!-- Fallback loader visible until React mounts -->
      <div id="initial-loader" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; color: #38bdf8; z-index: 9999; font-family: sans-serif;">
        <div style="width: 40px; height: 40px; border: 3px solid rgba(56, 189, 248, 0.2); border-top-color: #38bdf8; border-radius: 50%; animate: spin 1s linear infinite;"></div>
        <p style="margin-top: 16px; font-weight: bold; font-size: 14px; letter-spacing: 0.1em; margin-bottom: 4px;">ЗАГРУЗКА...</p>
        <span id="api-version" style="font-size: 10px; opacity: 0.5; font-family: monospace;">detecting...</span>
        <style>
          @keyframes spin { to { transform: rotate(360deg); } }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove loader when React app signals it's ready or after mount
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) loader.style.opacity = '0';
          setTimeout(function() { if (loader) loader.remove(); }, 500);
        }, 1000);
      });
    </script>
  </body>
</html>
