<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- iOS-optimized viewport: covers notch, prevents zoom, disables bounce -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Video Flow — AI Cinematic Studio</title>

    <!-- Premium Typography: Inter with Black weight -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Telegram Mini App SDK -->
    <script src="/telegram-web-app.js"></script>
    
    <script>
      // Global diagnostic log for debug panel
      window.__TMA_LOG__ = [];
      window.onloadStatus = 'pending';
      function logTMA(msg) { 
        console.log('[TMA]', msg); 
        window.__TMA_LOG__.push(msg);
      }

      // Aggressively init Telegram SDK as early as possible
      (function() {
        try {
          var checkCount = 0;
          var check = setInterval(function() {
            checkCount++;
            if (window.Telegram && window.Telegram.WebApp) {
              var tw = window.Telegram.WebApp;
              tw.ready();
              tw.expand();
              if (tw.disableVerticalSwipes) tw.disableVerticalSwipes();
              if (tw.setHeaderColor) tw.setHeaderColor('#050505');
              if (tw.setBackgroundColor) tw.setBackgroundColor('#050505');
              logTMA('SDK OK v' + tw.version);
              window.onloadStatus = 'loaded';
              clearInterval(check);
            }
            if (checkCount > 50) {
              logTMA('SDK Timeout — running in browser mode');
              window.onloadStatus = 'browser';
              clearInterval(check);
            }
          }, 100);
        } catch (e) {
          logTMA('Init Error: ' + e.message);
        }
      })();
    </script>

    <style>
      /* === CRITICAL PATH CSS: Applied before React mounts === */
      :root {
        --tg-bg: #050505;
        --tg-button: #38bdf8;
        --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        height: 100%;
        /* Prevent iOS rubber-band scroll */
        overscroll-behavior: none;
      }

      body {
        position: fixed; /* Hard-lock: no bounce, no scroll bleed */
        inset: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        background-color: var(--tg-bg);
        font-family: var(--font-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-user-select: none;
        user-select: none;
        /* Prevent text size adjustment on rotation */
        -webkit-text-size-adjust: 100%;
      }

      #root {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        /* Allow internal scrolling via .custom-scrollbar children */
        overflow: hidden;
      }

      /* === SPLASH / BOOT SCREEN === */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 20px 4px rgba(56, 189, 248, 0.2); }
        50%       { box-shadow: 0 0 40px 8px rgba(56, 189, 248, 0.4); }
      }

      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #050505;
        z-index: 9999;
        animation: fadeInUp 0.4s ease both;
        gap: 0;
      }

      #initial-loader .loader-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 40px 48px;
        background: rgba(255, 255, 255, 0.025);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 2rem;
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.15),
          0 30px 60px -20px rgba(0, 0, 0, 0.6);
      }

      #initial-loader .spinner-ring {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(56, 189, 248, 0.15);
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite, pulse-glow 2s ease-in-out infinite;
      }

      #initial-loader .loader-title {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 900;
        color: #f8fafc;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin: 0;
      }

      #initial-loader .loader-sub {
        font-family: 'Inter', monospace;
        font-size: 10px;
        font-weight: 500;
        color: rgba(148, 163, 184, 0.5);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin: 0;
      }

      #initial-loader .loader-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--tg-button);
        box-shadow: 0 0 10px var(--tg-button);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Splash screen — removed once React mounts -->
      <div id="initial-loader">
        <div class="loader-card">
          <div class="loader-dot"></div>
          <div class="spinner-ring"></div>
          <p class="loader-title">Video Flow</p>
          <span class="loader-sub" id="loader-status">Инициализация...</span>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Update splash status from SDK init
      var statusEl = document.getElementById('loader-status');
      var pollInterval = setInterval(function() {
        if (statusEl && window.onloadStatus !== 'pending') {
          statusEl.textContent = window.onloadStatus === 'loaded' ? 'Telegram SDK • OK' : 'Режим браузера';
          clearInterval(pollInterval);
        }
      }, 200);

      // Graceful fade-out after React renders
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.transition = 'opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
            loader.style.opacity = '0';
            loader.style.pointerEvents = 'none';
            setTimeout(function() { 
              if (loader.parentNode) loader.remove(); 
            }, 600);
          }
        }, 1200);
      });
    </script>
  </body>
</html>
